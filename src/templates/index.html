<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGames</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #06060f;
            color: #e8e8ff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Star field */
        #starfield {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Nebula blobs */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 30%, rgba(99,51,255,0.14) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 70%, rgba(0,200,255,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 90%, rgba(255,51,153,0.08) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* NAV */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 48px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(6,6,15,0.7);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            background: linear-gradient(90deg, #a78bff, #00c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #fff; }

        /* HERO */
        .hero {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 90px 20px 60px;
        }

        .hero-tag {
            display: inline-block;
            background: rgba(99,51,255,0.18);
            border: 1px solid rgba(99,51,255,0.35);
            color: #a78bff;
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 18px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #a78bff 0%, #00c8ff 50%, #f5c518 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: rgba(255,255,255,0.45);
            font-size: 1.1rem;
            max-width: 480px;
            margin: 0 auto 36px;
            line-height: 1.6;
        }

        .hero-btn {
            display: inline-block;
            background: linear-gradient(135deg, #6333ff, #3b82f6);
            color: #fff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            box-shadow: 0 8px 30px rgba(99,51,255,0.45);
            transition: box-shadow 0.2s, transform 0.15s;
        }
        .hero-btn:hover {
            box-shadow: 0 12px 40px rgba(99,51,255,0.65);
            transform: translateY(-2px);
        }

        /* GAMES GRID */
        .section {
            position: relative;
            z-index: 5;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 24px 80px;
        }

        .section-label {
            font-size: 0.72rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 28px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: rgba(14,14,28,0.85);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--card-color);
            opacity: 0.7;
            border-radius: 20px 20px 0 0;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.14);
            box-shadow: 0 20px 50px rgba(0,0,0,0.55), 0 0 30px color-mix(in srgb, var(--card-color) 20%, transparent);
        }

        .card-icon {
            font-size: 2.4rem;
            line-height: 1;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
        }

        .card-desc {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.42);
            line-height: 1.55;
        }

        .card-cta {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--card-color);
            opacity: 0.85;
            transition: opacity 0.2s, gap 0.2s;
        }
        .game-card:hover .card-cta { opacity: 1; gap: 12px; }

        /* FOOTER */
        footer {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 28px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <nav>
        <div class="logo">★ StarGames</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#games">Games</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-tag">🚀 Launch Pad</div>
        <h1>Play Among <span>the Stars</span></h1>
        <p>A galaxy of mini-games waiting for you. Pick your mission and blast off.</p>
        <a href="#games" class="hero-btn">Browse Games</a>
    </div>

    <div class="section" id="games">
        <div class="section-label">All Games</div>
        <div class="games-grid">
            {% for g in games %}
            <a class="game-card" href="/game/{{ g.id }}" style="--card-color: {{ g.color }}">
                <div class="card-icon">{{ g.icon }}</div>
                <div class="card-title">{{ g.title }}</div>
                <div class="card-desc">{{ g.description }}</div>
                <div class="card-cta">Play now →</div>
            </a>
            {% endfor %}
        </div>
    </div>

    <footer>© 2026 StarGames — Play Beyond The Universe</footer>

    <script>
        // Procedural star field
        const canvas = document.getElementById('starfield');
        const ctx    = canvas.getContext('2d');
        let stars    = [];

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = Array.from({length: 220}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.3 + 0.2,
                a: Math.random(),
                speed: Math.random() * 0.004 + 0.001,
                phase: Math.random() * Math.PI * 2,
            }));
        }

        function drawStars(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        resize();
        initStars();
        requestAnimationFrame(drawStars);
        window.addEventListener('resize', () => { resize(); initStars(); });
    </script>
</body>
</html>
