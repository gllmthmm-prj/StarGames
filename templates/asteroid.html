<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid Dodge – StarGames</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #03030a;
            color: #e8e8ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #spacebg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .lang-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 5px 10px;
            color: rgba(255,255,255,0.65); font-size: 0.82rem;
            cursor: pointer; outline: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .lang-select:hover { border-color: rgba(255,255,255,0.28); color: #fff; }
        .lang-select option { background: #12122a; color: #e8e8ff; }

        nav {
            position: relative; z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(3,3,10,0.82);
            backdrop-filter: blur(14px);
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.1rem; font-weight: 700;
            background: linear-gradient(90deg, #c4a8ff, #6ee7ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        nav a { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        nav a:hover { color: #fff; }

        .hud {
            position: relative; z-index: 10; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 32px;
            background: rgba(10,10,20,0.6);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hud-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .hud-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
        .hud-val   { font-size: 1.3rem; font-weight: 700; color: #ff6b35; }
        #livesVal  { font-size: 1.1rem; letter-spacing: 2px; }
        #levelVal  { color: #a78bff; }
        #bestVal   { color: rgba(255,255,255,0.45); }

        #gameCanvas {
            position: relative; z-index: 5;
            flex: 1; display: block;
            touch-action: none;
            cursor: crosshair;
        }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 30;
            backdrop-filter: blur(8px);
        }
        .overlay.hidden { display: none; }

        .ov-icon  { font-size: 3.5rem; }
        .ov-title {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(90deg, #ff6b35, #ffa060);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .ov-sub   { color: rgba(255,255,255,0.5); font-size: 0.95rem; text-align: center; max-width: 360px; line-height: 1.6; }
        .ov-score { font-size: 3rem; font-weight: 900; color: #ff6b35; }
        .ov-rank  { font-size: 1rem; font-weight: 700; min-height: 1.2rem; }

        .instructions {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,107,53,0.2);
            border-radius: 12px; padding: 14px 24px;
            font-size: 0.82rem; color: rgba(255,255,255,0.45);
            text-align: center; line-height: 1.8;
            max-width: 340px;
        }
        .instructions span { color: #ff6b35; font-weight: 600; }

        .diff-badge {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em;
            text-transform: uppercase; padding: 4px 14px; border-radius: 20px;
        }
        .diff-easy   { background: rgba(0,200,100,0.15); color: #00c864; border: 1px solid rgba(0,200,100,0.3); }
        .diff-medium { background: rgba(255,107,53,0.15); color: #ff6b35; border: 1px solid rgba(255,107,53,0.3); }
        .diff-hard   { background: rgba(255,50,80,0.15);  color: #ff3250; border: 1px solid rgba(255,50,80,0.3); }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #c94000);
            color: #fff; border: none; padding: 14px 44px;
            border-radius: 50px; font-size: 1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 8px 28px rgba(255,107,53,0.4);
            transition: transform 0.15s, box-shadow 0.2s;
            letter-spacing: 0.03em;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(255,107,53,0.6); }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 28px; border-radius: 50px;
            font-size: 0.88rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            text-decoration: none; display: inline-block;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

        .btn-row { display: flex; gap: 12px; align-items: center; }
    </style>
</head>
<body>
    <canvas id="spacebg"></canvas>

    <nav>
        <div class="logo">★ StarGames</div>
        <div style="display:flex;align-items:center;gap:20px">
            <a href="/" data-i18n="nav_home">Home</a>
            <a href="/" data-i18n="nav_games">Games</a>
            <a href="/wiki" data-i18n="nav_wiki">★ Wiki Stars</a>
            <select class="lang-select" onchange="setLang(this.value)">
                <option value="en">🌐 EN</option>
                <option value="fr">🌐 FR</option>
            </select>
            <button class="egg-btn" onclick="openEgg && openEgg()" title="🥚">🥚</button>
        </div>
    </nav>

    <div class="hud">
        <div class="hud-stat">
            <span class="hud-label" data-i18n="hud_score">Score</span>
            <span class="hud-val" id="scoreVal">0</span>
        </div>
        <div class="hud-stat">
            <span class="hud-label">Lives</span>
            <span class="hud-val" id="livesVal">❤️❤️❤️</span>
        </div>
        <div class="hud-stat">
            <span class="hud-label">Level</span>
            <span class="hud-val" id="levelVal">1</span>
        </div>
        <div class="hud-stat">
            <span class="hud-label" data-i18n="hud_best">Best</span>
            <span class="hud-val" id="bestVal">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="startOverlay">
        <div class="ov-icon">☄️</div>
        <div class="ov-title">Asteroid Dodge</div>
        <div id="diffBadge" class="diff-badge diff-medium">Medium</div>
        <div class="instructions">
            <span>← → / A D</span> — move ship<br>
            <span>Space</span> — shoot &nbsp;|&nbsp; <span>Touch</span> — drag &amp; tap<br>
            Dodge or destroy asteroids. Don't get hit!
        </div>
        <button class="btn-primary" id="btnStart">Start Game</button>
        <a href="/" class="btn-secondary">← Back to games</a>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="ov-icon" id="ovIcon">💥</div>
        <div class="ov-title" id="ovTitle">Game Over</div>
        <div class="ov-sub" id="ovSub">Your ship was destroyed by the asteroids.</div>
        <div class="ov-score" id="ovScore">0</div>
        <div class="ov-rank"  id="ovRank"></div>
        <div class="btn-row">
            <button class="btn-primary" id="btnRestart">Play Again</button>
            <a href="/" class="btn-secondary">Home</a>
        </div>
    </div>

    <script src="/static/spacebg.js"></script>
    <script src="/static/sounds.js"></script>
    <script src="/static/scores.js"></script>
    <script src="/static/i18n.js"></script>
    <script>
    (function () {
        'use strict';

        // ── Difficulty config ──────────────────────────────────────────────────
        const params = new URLSearchParams(location.search);
        const DIFF   = (params.get('difficulty') || 'medium').toLowerCase();

        const DIFF_CFG = {
            easy:   { lives: 3, speedBase: 1.2, speedScale: 0.25, spawnBase: 2200, spawnMin: 1100, spawnScale: 80 },
            medium: { lives: 3, speedBase: 1.8, speedScale: 0.35, spawnBase: 1600, spawnMin:  750, spawnScale: 55 },
            hard:   { lives: 2, speedBase: 2.6, speedScale: 0.50, spawnBase: 1100, spawnMin:  480, spawnScale: 40 },
        };
        const cfg = DIFF_CFG[DIFF] || DIFF_CFG.medium;

        // ── DOM refs ───────────────────────────────────────────────────────────
        const canvas         = document.getElementById('gameCanvas');
        const ctx            = canvas.getContext('2d');
        const scoreEl        = document.getElementById('scoreVal');
        const livesEl        = document.getElementById('livesVal');
        const levelEl        = document.getElementById('levelVal');
        const bestEl         = document.getElementById('bestVal');
        const startOverlay   = document.getElementById('startOverlay');
        const gameOverOverlay= document.getElementById('gameOverOverlay');
        const ovIcon         = document.getElementById('ovIcon');
        const ovTitle        = document.getElementById('ovTitle');
        const ovSub          = document.getElementById('ovSub');
        const ovScore        = document.getElementById('ovScore');
        const ovRank         = document.getElementById('ovRank');
        const btnStart       = document.getElementById('btnStart');
        const btnRestart     = document.getElementById('btnRestart');
        const diffBadge      = document.getElementById('diffBadge');

        // Set difficulty badge
        diffBadge.textContent = DIFF.charAt(0).toUpperCase() + DIFF.slice(1);
        diffBadge.className   = 'diff-badge diff-' + DIFF;

        // ── Canvas sizing ──────────────────────────────────────────────────────
        let W = 0, H = 0;
        function resize() {
            W = canvas.width  = canvas.offsetWidth;
            H = canvas.height = canvas.offsetHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // ── Game state ─────────────────────────────────────────────────────────
        let running       = false;
        let score         = 0;
        let lives         = cfg.lives;
        let level         = 1;
        let asteroidCount = 0;   // dodged + destroyed this level
        let invincible    = false;
        let invTimer      = 0;
        let flashState    = false;
        let lastShotTime  = 0;
        const SHOOT_CD    = 300; // ms

        // ── Entities ───────────────────────────────────────────────────────────
        const ship      = { x: 0, y: 0, w: 28, h: 36, speed: 5.5 };
        let asteroids   = [];
        let bullets     = [];
        let particles   = [];
        let floaters    = [];

        // ── Input ──────────────────────────────────────────────────────────────
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if ((e.code === 'Space') && running) {
                e.preventDefault();
                tryShoot();
            }
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        // Touch — drag ship & tap to shoot
        let touchStartX = null;
        let touchShipStartX = null;

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0];
            touchStartX    = t.clientX;
            touchShipStartX = ship.x;
            if (running) tryShoot();
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!running || touchStartX === null) return;
            const t   = e.touches[0];
            const dx  = t.clientX - touchStartX;
            ship.x    = Math.max(ship.w / 2, Math.min(W - ship.w / 2, touchShipStartX + dx));
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
        }, { passive: false });

        // ── Shooting ───────────────────────────────────────────────────────────
        function tryShoot() {
            const now = performance.now();
            if (now - lastShotTime < SHOOT_CD) return;
            lastShotTime = now;
            bullets.push({ x: ship.x, y: ship.y - ship.h / 2, vy: -11, r: 3 });
            SFX.catch();
        }

        // ── Spawn asteroid ─────────────────────────────────────────────────────
        // Build an irregular polygon shape (7–11 vertices with random radial jitter)
        function makeAsteroidShape(sides) {
            const verts = [];
            for (let i = 0; i < sides; i++) {
                const angle  = (Math.PI * 2 / sides) * i - Math.PI / 2;
                const jitter = 0.65 + Math.random() * 0.7; // 0.65–1.35 of radius
                verts.push({ a: angle, r: jitter });
            }
            return verts;
        }

        function spawnAsteroid() {
            const radius  = 12 + Math.random() * 20;           // 12–32
            const sides   = 7 + Math.floor(Math.random() * 5); // 7–11
            const speedMult = cfg.speedBase + (level - 1) * cfg.speedScale;
            const speed   = speedMult * (0.8 + Math.random() * 0.7);
            const colors  = ['#8a7a6a', '#9b8c7c', '#b4a08e', '#7a6a5a', '#c0a882'];
            const craterCount = Math.floor(radius / 8);
            const craters = [];
            for (let c = 0; c < craterCount; c++) {
                craters.push({
                    cx: (Math.random() - 0.5) * radius * 0.9,
                    cy: (Math.random() - 0.5) * radius * 0.9,
                    cr: radius * (0.08 + Math.random() * 0.12),
                });
            }
            asteroids.push({
                x:      Math.random() * (W - 80) + 40,
                y:      -radius - 10,
                r:      radius,
                vx:     (Math.random() - 0.5) * 0.8,
                vy:     speed,
                rot:    0,
                rotSpeed: (Math.random() - 0.5) * 0.04,
                shape:  makeAsteroidShape(sides),
                color:  colors[Math.floor(Math.random() * colors.length)],
                hp:     radius > 24 ? 2 : 1, // big asteroids take 2 hits
                craters,
            });
        }

        // ── Particles ──────────────────────────────────────────────────────────
        function spawnDebris(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r:  1.5 + Math.random() * 3,
                    life: 1,
                    color,
                });
            }
        }

        function spawnFloater(x, y, text, color) {
            floaters.push({ x, y, text, color: color || '#ff6b35', life: 1, vy: -1.4 });
        }

        // ── Drawing helpers ────────────────────────────────────────────────────
        function drawShip(x, y, flashing) {
            if (flashing) return; // skip draw during flash
            ctx.save();
            ctx.translate(x, y);

            // Engine glow
            const grad = ctx.createRadialGradient(0, 14, 2, 0, 14, 22);
            grad.addColorStop(0, 'rgba(255,107,53,0.9)');
            grad.addColorStop(0.5, 'rgba(255,60,20,0.4)');
            grad.addColorStop(1, 'rgba(255,60,20,0)');
            ctx.beginPath();
            ctx.ellipse(0, 16, 8, 14, 0, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Ship body (triangle pointing up)
            ctx.beginPath();
            ctx.moveTo(0, -ship.h / 2);        // nose
            ctx.lineTo(-ship.w / 2, ship.h / 2); // bottom-left
            ctx.lineTo(0, ship.h / 2 - 8);      // tail center
            ctx.lineTo(ship.w / 2, ship.h / 2);  // bottom-right
            ctx.closePath();
            ctx.fillStyle = '#c8d8ff';
            ctx.shadowColor = '#6ee7ff';
            ctx.shadowBlur  = 10;
            ctx.fill();

            // Cockpit
            ctx.beginPath();
            ctx.ellipse(0, -ship.h / 2 + 10, 5, 8, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#6ee7ff';
            ctx.shadowColor = '#6ee7ff';
            ctx.shadowBlur  = 14;
            ctx.fill();

            ctx.restore();
        }

        function drawAsteroid(a) {
            ctx.save();
            ctx.translate(a.x, a.y);
            ctx.rotate(a.rot);

            // Shadow / glow
            ctx.shadowColor = 'rgba(120,90,60,0.6)';
            ctx.shadowBlur  = 12;

            // Fill
            ctx.beginPath();
            const verts = a.shape;
            for (let i = 0; i < verts.length; i++) {
                const v = verts[i];
                const px = Math.cos(v.a) * a.r * v.r;
                const py = Math.sin(v.a) * a.r * v.r;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();

            const grd = ctx.createRadialGradient(-a.r * 0.3, -a.r * 0.3, a.r * 0.1, 0, 0, a.r * 1.2);
            grd.addColorStop(0, '#d4bfa0');
            grd.addColorStop(0.4, a.color);
            grd.addColorStop(1, '#3a3028');
            ctx.fillStyle = grd;
            ctx.fill();

            // Edge stroke
            ctx.strokeStyle = 'rgba(255,220,180,0.2)';
            ctx.lineWidth   = 1;
            ctx.stroke();

            // Craters (pre-generated at spawn time — no Math.random() in render loop)
            ctx.shadowBlur = 0;
            if (a.craters) {
                for (let c = 0; c < a.craters.length; c++) {
                    const { cx, cy, cr } = a.craters[c];
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fill();
                }
            }

            ctx.restore();
        }

        function drawBullet(b) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fillStyle = '#ffe070';
            ctx.shadowColor = '#ffcc00';
            ctx.shadowBlur  = 10;
            ctx.fill();
            // Tail
            ctx.beginPath();
            ctx.moveTo(b.x, b.y + b.r);
            ctx.lineTo(b.x, b.y + 14);
            ctx.strokeStyle = 'rgba(255,200,50,0.4)';
            ctx.lineWidth   = 2;
            ctx.stroke();
            ctx.restore();
        }

        // ── Update HUD ─────────────────────────────────────────────────────────
        function updateHUD() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            const hearts = '❤️'.repeat(lives);
            livesEl.textContent = lives > 0 ? hearts : '💀';
        }

        // ── Collision helpers ──────────────────────────────────────────────────
        function circleHitsPolygon(bx, by, br, ax, ay, aRot, verts, aR) {
            // Transform bullet into asteroid's local space
            const dx  = bx - ax;
            const dy  = by - ay;
            const cos = Math.cos(-aRot);
            const sin = Math.sin(-aRot);
            const lx  = dx * cos - dy * sin;
            const ly  = dx * sin + dy * cos;
            // Quick bounding-circle check
            if (lx * lx + ly * ly > (aR + br) * (aR + br)) return false;
            return true;
        }

        function shipHitsAsteroid(a) {
            const dx = ship.x - a.x;
            const dy = ship.y - a.y;
            // Use a smaller hit radius for fairness
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < a.r + 14;
        }

        // ── Spawn timer ────────────────────────────────────────────────────────
        let spawnTimer  = 0;
        let spawnDelay  = cfg.spawnBase; // ms between spawns

        function updateSpawnDelay() {
            spawnDelay = Math.max(cfg.spawnMin, cfg.spawnBase - (level - 1) * cfg.spawnScale);
        }

        // ── Level up ───────────────────────────────────────────────────────────
        function checkLevelUp() {
            if (asteroidCount >= 10) {
                asteroidCount = 0;
                level++;
                updateSpawnDelay();
                updateHUD();
                spawnFloater(W / 2, H / 2 - 40, `LEVEL ${level}!`, '#a78bff');
                SFX.correct();
                levelEl.style.transform = 'scale(1.5)';
                setTimeout(() => { levelEl.style.transform = ''; }, 300);
            }
        }

        // ── Hit player ─────────────────────────────────────────────────────────
        function hitPlayer() {
            if (invincible) return;
            lives--;
            updateHUD();
            SFX.wrong();
            if (lives <= 0) {
                endGame();
                return;
            }
            invincible = true;
            invTimer   = 0;
            // Camera shake
            canvas.style.transform = 'translateX(4px)';
            setTimeout(() => { canvas.style.transform = ''; }, 80);
        }

        // ── Main loop ──────────────────────────────────────────────────────────
        let lastTime = 0;
        let rafId    = null;

        function gameLoop(now) {
            if (!running) return;
            const dt = now - lastTime;
            lastTime = now;

            // Ship movement
            if (keys['ArrowLeft'] || keys['KeyA']) {
                ship.x = Math.max(ship.w / 2, ship.x - ship.speed);
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                ship.x = Math.min(W - ship.w / 2, ship.x + ship.speed);
            }

            // Spawn timer
            spawnTimer += dt;
            if (spawnTimer >= spawnDelay) {
                spawnTimer = 0;
                spawnAsteroid();
            }

            // Invincibility flash
            if (invincible) {
                invTimer += dt;
                flashState = Math.floor(invTimer / 120) % 2 === 0;
                if (invTimer >= 2000) {
                    invincible = false;
                    flashState = false;
                }
            }

            // ── Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y += b.vy;
                if (b.y < -10) { bullets.splice(i, 1); }
            }

            // ── Update asteroids + bullet/ship collisions
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                a.x  += a.vx;
                a.y  += a.vy;
                a.rot += a.rotSpeed;

                // Off bottom — asteroid dodged
                if (a.y > H + a.r + 10) {
                    asteroids.splice(i, 1);
                    score += 5;
                    asteroidCount++;
                    updateHUD();
                    checkLevelUp();
                    continue;
                }

                // Bullet collisions
                let hit = false;
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (circleHitsPolygon(b.x, b.y, b.r, a.x, a.y, a.rot, a.shape, a.r)) {
                        bullets.splice(j, 1);
                        a.hp--;
                        if (a.hp <= 0) {
                            // Destroy asteroid
                            spawnDebris(a.x, a.y, a.color, 18);
                            spawnFloater(a.x, a.y - a.r - 8, '+10', '#ff6b35');
                            asteroids.splice(i, 1);
                            score += 10;
                            asteroidCount++;
                            updateHUD();
                            checkLevelUp();
                            hit = true;
                        } else {
                            // Cracked but not destroyed (big asteroid, 1 crack)
                            spawnDebris(a.x, a.y, a.color, 6);
                        }
                        break;
                    }
                }
                if (hit) continue;

                // Ship collision
                if (shipHitsAsteroid(a)) {
                    spawnDebris(a.x, a.y, a.color, 10);
                    asteroids.splice(i, 1);
                    hitPlayer();
                }
            }

            // ── Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x    += p.vx;
                p.y    += p.vy;
                p.vy   += 0.12; // gravity
                p.life -= 0.025;
                if (p.life <= 0) { particles.splice(i, 1); }
            }

            // ── Update floaters
            for (let i = floaters.length - 1; i >= 0; i--) {
                const f = floaters[i];
                f.y    += f.vy;
                f.life -= 0.02;
                if (f.life <= 0) { floaters.splice(i, 1); }
            }

            // ── Render ──────────────────────────────────────────────────────────
            ctx.clearRect(0, 0, W, H);

            // Asteroids
            asteroids.forEach(drawAsteroid);

            // Bullets
            bullets.forEach(drawBullet);

            // Particles
            ctx.save();
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur  = 6;
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.restore();

            // Floaters
            ctx.save();
            floaters.forEach(f => {
                ctx.globalAlpha = f.life;
                ctx.font        = 'bold 16px Segoe UI, Arial, sans-serif';
                ctx.fillStyle   = f.color;
                ctx.textAlign   = 'center';
                ctx.shadowColor = f.color;
                ctx.shadowBlur  = 12;
                ctx.fillText(f.text, f.x, f.y);
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur  = 0;
            ctx.restore();

            // Ship
            drawShip(ship.x, ship.y, flashState);

            rafId = requestAnimationFrame(gameLoop);
        }

        // ── End game ───────────────────────────────────────────────────────────
        function endGame() {
            running = false;
            if (rafId) cancelAnimationFrame(rafId);
            SFX.gameOver(false);

            const scRes = ScoreManager.save('asteroid', score);
            const best  = ScoreManager.getBest('asteroid');
            bestEl.textContent = best;

            ovScore.textContent = score;
            ovIcon.textContent  = score >= 200 ? '🏆' : '💥';
            ovTitle.textContent = score >= 200 ? 'Stellar Pilot!' : 'Game Over';
            ovSub.textContent   = `You reached level ${level} with a score of ${score}.`;

            if (scRes.rank === 1) {
                ovRank.textContent  = '🏆 New Best!';
                ovRank.style.color  = '#f5c518';
            } else if (scRes.isNew) {
                ovRank.textContent  = `Rank #${scRes.rank}`;
                ovRank.style.color  = '#a78bff';
            } else {
                ovRank.textContent  = '';
            }

            gameOverOverlay.classList.remove('hidden');
        }

        // ── Start / reset game ─────────────────────────────────────────────────
        function startGame() {
            // Reset state
            score         = 0;
            lives         = cfg.lives;
            level         = 1;
            asteroidCount = 0;
            invincible    = false;
            invTimer      = 0;
            flashState    = false;
            lastShotTime  = 0;
            spawnTimer    = 0;
            spawnDelay    = cfg.spawnBase;

            asteroids  = [];
            bullets    = [];
            particles  = [];
            floaters   = [];

            ship.x = W / 2;
            ship.y = H - ship.h - 20;

            updateHUD();

            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            running  = true;
            lastTime = performance.now();
            rafId    = requestAnimationFrame(gameLoop);
        }

        // ── Button listeners ───────────────────────────────────────────────────
        btnStart.addEventListener('click', startGame);
        btnRestart.addEventListener('click', startGame);

        // ── Load best score on boot ────────────────────────────────────────────
        bestEl.textContent = ScoreManager.getBest('asteroid') || 0;

        // ── Init i18n ──────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initLang === 'function') initLang();
        });

    }());
    </script>
</body>
</html>
