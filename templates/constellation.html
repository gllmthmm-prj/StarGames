<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellation Quiz – StarGames</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #03030a;
            color: #e8e8ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #spacebg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .lang-select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:5px 10px; color:rgba(255,255,255,0.65); font-size:0.82rem; cursor:pointer; outline:none; transition:border-color 0.2s,color 0.2s; }
        .lang-select:hover { border-color:rgba(255,255,255,0.28); color:#fff; }
        .lang-select option { background:#12122a; color:#e8e8ff; }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(3,3,10,0.82);
            backdrop-filter: blur(14px);
            z-index: 20; flex-shrink: 0;
        }
        .logo { font-size: 1.1rem; font-weight: 700; background: linear-gradient(90deg,#c4a8ff,#6ee7ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        nav a:hover { color: #fff; }

        /* HUD */
        .hud {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 32px;
            background: rgba(10,10,20,0.7);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0; z-index: 10;
        }
        .hud-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .hud-label { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.28); }
        .hud-val   { font-size: 1.15rem; font-weight: 700; color: #a78bff; }
        #timerVal  { color: #f5c518; transition: color 0.3s; }
        #timerVal.urgent { color: #ff6b8a; animation: pulse 0.6s ease-in-out infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

        /* Game area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        /* Nebula bg */
        .game-area::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 20% 40%, rgba(99,51,255,0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(0,200,255,0.07) 0%, transparent 55%);
            pointer-events: none;
        }

        /* Canvas container */
        .canvas-wrap {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 60px rgba(99,51,255,0.15), 0 20px 50px rgba(0,0,0,0.6);
        }

        #constellationCanvas {
            display: block;
        }

        /* Hint label */
        .hint-label {
            position: absolute;
            bottom: 12px; left: 50%; transform: translateX(-50%);
            font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        /* Answer buttons */
        .answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 520px;
        }

        .ans-btn {
            background: rgba(18,18,36,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 13px 16px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s, color 0.15s;
            text-align: center;
        }
        .ans-btn:hover:not(:disabled) {
            background: rgba(35,35,60,0.95);
            border-color: rgba(167,139,255,0.4);
            color: #fff;
            transform: translateY(-2px);
        }
        .ans-btn:disabled { cursor: default; }
        .ans-btn.correct {
            background: rgba(0,200,100,0.18);
            border-color: #00c864;
            color: #5dffa5;
        }
        .ans-btn.wrong {
            background: rgba(255,51,100,0.18);
            border-color: #ff3364;
            color: #ff8aaa;
        }

        /* Feedback strip */
        .feedback-strip {
            height: 22px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            transition: opacity 0.3s;
        }
        .feedback-strip.correct { color: #5dffa5; }
        .feedback-strip.wrong   { color: #ff8aaa; }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.78);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 40;
            backdrop-filter: blur(8px);
        }
        .overlay.hidden { display: none; }
        .overlay-icon  { font-size: 3.5rem; line-height: 1; }
        .overlay h2    { font-size: 1.9rem; font-weight: 800; }
        .overlay .sub  { color: rgba(255,255,255,0.45); font-size: 0.95rem; text-align: center; max-width: 340px; line-height: 1.5; }
        .overlay .big-score { font-size: 3.5rem; font-weight: 900; color: #a78bff; }
        .btn-action {
            background: linear-gradient(135deg,#6333ff,#3b82f6);
            color: #fff; border: none; padding: 13px 38px;
            border-radius: 50px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; box-shadow: 0 8px 28px rgba(99,51,255,0.4);
            transition: transform 0.15s, box-shadow 0.2s; margin-top: 4px;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(99,51,255,0.6); }
        .overlay-back {
            color: rgba(255,255,255,0.25); font-size: 0.82rem;
            text-decoration: none; margin-top: 2px;
            transition: color 0.2s;
        }
        .overlay-back:hover { color: rgba(255,255,255,0.6); }

        /* Progress dots */
        .progress-dots {
            display: flex; gap: 6px;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.12);
            transition: background 0.3s;
        }
        .dot.done    { background: #a78bff; }
        .dot.correct { background: #00c864; }
        .dot.wrong   { background: #ff3364; }
        .dot.active  { background: #f5c518; box-shadow: 0 0 6px #f5c518; }
    </style>
</head>

    // ─── State ────────────────────────────────────────────────────────────────
    const TOTAL_ROUNDS = 10;

    let animFrame    = null;

    let revealSpeed  = 0.025;

    // ─── DOM ─────────────────────────────────────────────────────────────────
    const canvas      = document.getElementById('constellationCanvas');
    const ctx         = canvas.getContext('2d');

    const timerEl     = document.getElementById('timerVal');
    const roundEl     = document.getElementById('roundVal');

    // ─── Canvas sizing ────────────────────────────────────────────────────────
    function sizeCanvas() {
        const maxW  = Math.min(window.innerWidth - 32, 520);
        const maxH  = Math.min(window.innerHeight * 0.42, 300);
        const size  = Math.min(maxW, maxH);
        canvas.width  = size;
        canvas.height = size;
        canvasWrap.style.width  = size + 'px';
        canvasWrap.style.height = size + 'px';
    }
    sizeCanvas();
    window.addEventListener('resize', () => { sizeCanvas(); drawConstellation(CONSTELLATIONS[currentIdx], revealAnim); });

    // ─── Drawing ──────────────────────────────────────────────────────────────
    function drawConstellation(c, progress) {
        if (!c) return;
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        // Background: faint star field
        ctx.fillStyle = 'rgba(255,255,255,0)';
        for (let i = 0; i < 80; i++) {
            const bx = ((i * 137.5) % 1) * W;
            const by = ((i * 97.3)  % 1) * H;
            const br = Math.random() * 0 + 0.6;
            const ba = 0.1 + (i % 5) * 0.06;
            ctx.beginPath();
            ctx.arc(bx, by, br, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${ba})`;
            ctx.fill();
        }

        const pad = W * 0.1;
        const cx  = (x) => pad + x * (W - 2 * pad);
        const cy  = (y) => pad + y * (H - 2 * pad);

        const totalLines = c.lines.length;
        const drawnLines = Math.floor(progress * totalLines);
        const partial    = (progress * totalLines) - drawnLines;

        // Draw fully revealed lines
        for (let i = 0; i < drawnLines; i++) {
            const [a, b] = c.lines[i];
            const ax = cx(c.stars[a].x), ay = cy(c.stars[a].y);
            const bx = cx(c.stars[b].x), by = cy(c.stars[b].y);
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(bx, by);
            ctx.strokeStyle = 'rgba(167,139,255,0.35)';
            ctx.lineWidth   = 1.2;
            ctx.stroke();
        }

        // Draw partial line (animating)
        if (drawnLines < totalLines && progress < 1) {
            const [a, b] = c.lines[drawnLines];
            const ax = cx(c.stars[a].x), ay = cy(c.stars[a].y);
            const bx = cx(c.stars[b].x), by = cy(c.stars[b].y);
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(ax + (bx - ax) * partial, ay + (by - ay) * partial);
            ctx.strokeStyle = 'rgba(167,139,255,0.2)';
            ctx.lineWidth   = 1.2;
            ctx.stroke();
        }

        // Draw stars
        c.stars.forEach((s, i) => {
            const sx = cx(s.x), sy = cy(s.y);
            const isBright = c.bright && c.bright.includes(i);
            const r = isBright ? 4 : 2.5;

            // Glow
            const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 5);
            grd.addColorStop(0, isBright ? 'rgba(245,197,24,0.5)' : 'rgba(200,210,255,0.3)');
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath();
            ctx.arc(sx, sy, r * 5, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI * 2);
            ctx.fillStyle = isBright ? '#f5c518' : '#d0d8ff';
            ctx.shadowColor = isBright ? '#f5c518' : '#a78bff';
            ctx.shadowBlur  = isBright ? 12 : 6;
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function animateDraw(c) {
        revealAnim = 0;
        if (animFrame) cancelAnimationFrame(animFrame);
        function step() {
            revealAnim = Math.min(revealAnim + revealSpeed, 1);
            drawConstellation(c, revealAnim);
            if (revealAnim < 1) animFrame = requestAnimationFrame(step);
        }
        animFrame = requestAnimationFrame(step);
    }

    // ─── Progress dots ────────────────────────────────────────────────────────
    function buildDots() {
        progressDots.innerHTML = '';
        for (let i = 0; i < TOTAL_ROUNDS; i++) {
            const d = document.createElement('div');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            d.id = `dot${i}`;
            progressDots.appendChild(d);
        }
    }

    function updateDot(idx, result) {
        const d = document.getElementById(`dot${idx}`);
        if (!d) return;
        d.classList.remove('active', 'done');
        d.classList.add(result);
        const next = document.getElementById(`dot${idx + 1}`);
        if (next) next.classList.add('active');
    }

    // ─── Round logic ──────────────────────────────────────────────────────────
    function pickConstellation() {
        if (usedIndices.length >= CONSTELLATIONS.length) usedIndices = [];
        let idx;
        do { idx = Math.floor(Math.random() * CONSTELLATIONS.length); }
        while (usedIndices.includes(idx));
        usedIndices.push(idx);
        return idx;
    }

    function getDistractors(correctIdx, count) {
        const pool = CONSTELLATIONS.map((c, i) => i).filter(i => i !== correctIdx);
        const shuffled = pool.sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count).map(i => CONSTELLATIONS[i].name);
    }

    function startRound() {
        answered = false;
        feedback.textContent = '';
        feedback.className   = 'feedback-strip';
        timeLeft = ROUND_TIME;
        timerEl.textContent  = timeLeft;
        timerEl.classList.remove('urgent');
        roundEl.textContent  = `${round + 1} / ${TOTAL_ROUNDS}`;

        currentIdx = pickConstellation();
        const c    = CONSTELLATIONS[currentIdx];

        // Build answer choices
        const distractors = getDistractors(currentIdx, 3);
        const choices = [c.name, ...distractors].sort(() => Math.random() - 0.5);
        answersGrid.innerHTML = '';
        choices.forEach(name => {
            const btn = document.createElement('button');
            btn.className   = 'ans-btn';
            btn.textContent = name;
            btn.addEventListener('click', () => handleAnswer(name, c.name, btn));
            answersGrid.appendChild(btn);
        });

        // Animate constellation draw
        animateDraw(c);

        // Start timer
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;
            if (timeLeft <= 5) timerEl.classList.add('urgent');
            if (timeLeft <= 0) {
                clearInterval(timerId);
                handleAnswer(null, c.name, null);
            }
        }, 1000);
    }

    function handleAnswer(chosen, correct, btn) {
        if (answered) return;
        answered = true;
        clearInterval(timerId);

        const btns = answersGrid.querySelectorAll('.ans-btn');
        btns.forEach(b => {
            b.disabled = true;
            if (b.textContent === correct) b.classList.add('correct');
        });

        if (chosen === correct) {
            const timeBonus = Math.ceil(timeLeft / 3);
            const earned    = 1 + timeBonus;
            score          += earned;
            scoreEl.textContent  = score;
            feedback.textContent = `✓ Correct! +${earned} pts (${timeBonus} speed bonus)`;
            feedback.className   = 'feedback-strip correct';
            roundResults.push('correct');
            updateDot(round, 'correct');
        } else {
            if (btn) btn.classList.add('wrong');
            feedback.textContent = chosen ? `✗ That's ${CONSTELLATIONS[currentIdx].name}` : `⏱ Time's up! That was ${correct}`;
            feedback.className   = 'feedback-strip wrong';
            roundResults.push('wrong');
            updateDot(round, 'wrong');
        }

        round++;
        if (round >= TOTAL_ROUNDS) {
            setTimeout(showResult, 1600);
        } else {
            setTimeout(startRound, 1800);
        }
    }

    // ─── Result screen ────────────────────────────────────────────────────────
    function showResult() {
        const correct = roundResults.filter(r => r === 'correct').length;
        const emoji   = correct >= 8 ? '🏆' : correct >= 5 ? '🌟' : '🚀';
        const msg     = correct >= 8
            ? 'You\'re a master astronomer!'
            : correct >= 5
            ? 'Good star knowledge!'
            : 'Keep gazing at the stars!';

        const lang = localStorage.getItem('sg_lang') || 'en';
        const T    = (k) => (typeof TRANSLATIONS !== 'undefined' && TRANSLATIONS[lang]?.[k]) || k;
        oIcon.textContent  = emoji;
        oTitle.textContent = T('cq_complete');
        oSub.innerHTML     = `You scored <strong style="color:#a78bff">${score} points</strong> and identified ${correct} of ${TOTAL_ROUNDS} constellations correctly.<br><br><em style="font-size:0.85rem;color:rgba(255,255,255,0.35)">${msg}</em>`;
        btnAction.textContent = T('btn_again');
        btnAction.onclick = () => { overlay.classList.add('hidden'); resetGame(); startRound(); };
        overlay.classList.remove('hidden');
    }

    function resetGame() {
        round        = 0;
        score        = 0;
        roundResults = [];
        usedIndices  = [];
        scoreEl.textContent = '0';
        timerEl.classList.remove('urgent');
        buildDots();
    }

    // ─── Boot ─────────────────────────────────────────────────────────────────
    buildDots();

    btnAction.onclick = () => {
        overlay.classList.add('hidden');
        resetGame();
        startRound();
    };
    </script>
    <script src="/static/i18n.js"></script>
    <script src="/static/spacebg.js"></script>
    <script>document.addEventListener('DOMContentLoaded', initLang);</script>
</body>
